<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Spotify Clone{% endblock %}</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body { background:#121212; color:#fff; font-family: Arial, sans-serif; margin:0; padding:0; }
    .container { max-width:1000px; margin:40px auto; padding:20px; }
    a { color:#1DB954; text-decoration:none; }
    .nav { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .card { background:#181818; padding:16px; border-radius:8px; margin:8px 0; }
    .messages { margin-bottom:10px; }
    .btn { background:#1DB954; border:none; padding:8px 14px; border-radius:20px; cursor:pointer; color:#000; font-weight:700; }
    input, select { padding:10px; border-radius:6px; border:none; background:#282828; color:#fff; width:100%; box-sizing:border-box; }
    label { display:block; margin:8px 0 4px; color:#ccc; }
    form .row { margin-bottom:10px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav">
      <div><a href="{% url 'home' %}">Spotify Clone</a></div>
      <div>
        {% if user.is_authenticated %}
          Hello, {{ user.username }} &nbsp; <a href="{% url 'logout' %}">Logout</a>
        {% else %}
          <a href="{% url 'login' %}">Login</a> &nbsp; <a href="{% url 'signup' %}">Sign up</a>
        {% endif %}
      </div>
    </div>

    <div class="messages">
      {% if messages %}
        {% for m in messages %}
          <div class="card">{{ m }}</div>
        {% endfor %}
      {% endif %}
    </div>

    {% block content %}{% endblock %}
  </div>
</body>
</html>
